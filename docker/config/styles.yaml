lighting_setups:
  studio_even:
    name: "Studio Even"
    description: "Three-point professional lighting"
    lights:
      - name: "Key"
        location: [5, -5, 5]
        energy: 1000
      - name: "Fill"
        location: [-3, -3, 4]
        energy: 500
      - name: "Back"
        location: [0, 5, 3]
        energy: 300
        
  studio_dramatic:
    name: "Studio Dramatic"
    description: "High contrast film noir style"
    lights:
      - name: "Key"
        location: [3, -3, 5]
        energy: 1500
      - name: "Rim"
        location: [-2, 1, 2]
        energy: 800
        
  natural:
    name: "Natural Window Light"
    description: "Soft directional sunlight"
    lights:
      - name: "Sun"
        location: [2, -2, 8]
        energy: 1200