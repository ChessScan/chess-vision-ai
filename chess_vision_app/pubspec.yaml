name: chess_vision_app
description: Chess Vision App - Automatic chess board detection and recording

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Camera
  camera: ^0.10.5+9
  
  # Storage
  path_provider: ^2.1.2
  path: ^1.9.0
  
  # Video playback
  video_player: ^2.8.2
  
  # Permissions
  permission_handler: ^11.3.0
  
  # Date formatting
  intl: ^0.19.0
  
  # State management
  flutter_bloc: ^8.1.4
  provider: ^6.1.2
  
  # UI
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
  
  assets:
    - assets/
