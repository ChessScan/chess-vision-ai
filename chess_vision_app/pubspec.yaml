name: chess_vision_app
description: Chess Vision App - Automatic chess board detection and recording

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=2.19.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Camera
  camera: ^0.10.0+1
  
  # Storage
  path_provider: ^2.0.14
  path: ^1.8.2
  
  # Video playback
  video_player: ^2.6.1
  
  # Permissions
  permission_handler: ^10.4.0
  
  # Date formatting - downgraded for Flutter 2.x compatibility
  intl: ^0.18.1
  
  # State management
  provider: ^6.0.5

  # UI
  cupertino_icons: ^1.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/
