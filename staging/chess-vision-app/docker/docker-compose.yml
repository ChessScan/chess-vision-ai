version: '3.8'

services:
  # Mobile app development
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: chess-vision-app:dev
    container_name: chess-vision-app-dev
    volumes:
      - ../:/workspace/app
      - app-node-modules:/workspace/app/node_modules
    working_dir: /workspace/app
    stdin_open: true
    tty: true
    ports:
      - "8081:8081"  # Metro bundler
      - "19000:19000"  # Expo
      - "19006:19006"  # Expo web
      - "19001-19002:19001-19002"  # Expo DevTools
    environment:
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      - REACT_NATIVE_PACKAGER_HOSTNAME=localhost
    command: bash

volumes:
  app-node-modules: