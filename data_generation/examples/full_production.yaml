# Full Production Config
# 130,000 images across train/val/test

name: "chess_vision_production_v1"
description: "Full production dataset: 130 positions × 1000 variations"
version: "1.0.0"

generation:
  total_images: 130000
  random_seed: 20260327
  distribution:
    train: 0.80       # 104,000 images
    val: 0.10         # 13,000 images
    test: 0.10        # 13,000 images
  checkpoint_interval: 1000         # Save every 1000 images

board_positions:
  source: "curated"
  collection: "cv001_full_set"
  count: 130
  categories:
    opening: 20       # Ruy Lopez, Italian, QGD, etc.
    middlegame: 40    # Open games, closed, complex positions
    endgame: 30       # K+P, R endings, minor piece endings
    tactical: 25      # Pins, forks, skewers, discoveries
    random_legal: 15  # Edge cases, unusual positions
  constraints:
    min_pieces: 3
    max_pieces: 32
    enforce_kings: true
    stockfish_eval:     # Ensure clear positions
      min_eval: -5      # Avoid completely lost positions
      max_eval: 5
  sources:
    - name: "lichess"
      url: "database.lichess.org"
      filter: "most_common"
    - name: "chess.com_puzzles"
      filter: "rating_1000_2000"
    - name: "endgame_tablebase"
      pieces: "3_to_5"

camera:
  angle_range: [30, 60]
  angle_distribution: "triangular"   # Peak at 45°
  angle_peak: 45
  rotation_range: [0, 360]
  rotation_distribution: "uniform"
  distance_range: [25, 45]
  distance_distribution: "uniform"
  focal_length: 26
  focal_length_range: [24, 28]       # Slight variation
  lens_distortion_range: [-0.02, 0.02]
  depth_of_field:
    enabled: true
    f_stop_range: [2.8, 5.6]
    focus_variance: 0.02              # Slight misfocus

camera_perturbations:
  # Add realism: small random errors
  tilt_range: [-3, 3]                 # degrees
  roll_range: [-2, 2]                 # degrees
  shift_range: [-0.5, 0.5]              # sensor shift, cm

lighting:
  environments:
    - name: "office_morning"
      hdri: "assets/hdri/office_window_4k.hdr"
      intensity_range: [0.75, 1.0]
      color_temp_range: [4500, 5500]
      weight: 0.25
    - name: "tournament_hall"
      hdri: "assets/hdri/tournament_venue_4k.hdr"
      intensity_range: [0.9, 1.3]
      color_temp_range: [5500, 6500]
      weight: 0.25
    - name: "home_evening"
      hdri: "assets/hdri/home_warm_4k.hdr"
      intensity_range: [0.6, 0.9]
      color_temp_range: [3200, 4500]
      weight: 0.20
    - name: "studio_neutral"
      hdri: "assets/hdri/studio_4k.hdr"
      intensity_range: [0.85, 1.15]
      color_temp_range: [5500, 6500]
      weight: 0.20
    - name: "outdoor_cloudy"
      hdri: "assets/hdri/cloudy_sky_4k.hdr"
      intensity_range: [0.7, 1.2]
      color_temp_range: [6000, 7500]
      weight: 0.10
  shadow_softness_range: [0.25, 0.75]
  fill_light_ratio_range: [0.2, 0.4]

materials:
  board_variants:
    - name: "walnut_classic"
      path: "assets/boards/walnut_tournament/"
      square_colors:
        light: "#F0DAB5"
        dark: "#8B5A2B"
      weight: 0.30
    - name: "maple_tournament"
      path: "assets/boards/maple_green/"
      square_colors:
        light: "#FFFFD0"
        dark: "#769656"
      weight: 0.35
    - name: "mahogany_dark"
      path: "assets/boards/mahogany/"
      square_colors:
        light: "#E8CFA4"
        dark: "#5C4033"
      weight: 0.20
    - name: "plastic_green"
      path: "assets/boards/plastic_tournament/"
      square_colors:
        light: "#F5F5DC"
        dark: "#4A7C59"
      weight: 0.15
  piece_variants:
    - name: "weighted_tournament"
      path: "assets/pieces/tournament_staunton/"
      material: "plastic"
      weight: 0.45
    - name: "classic_wood"
      path: "assets/pieces/wood_classic/"
      material: "wood"
      weight: 0.35
    - name: "3d_printed_matte"
      path: "assets/pieces/pla_matte/"
      material: "pla"
      weight: 0.20
  wear_level_range: [0.0, 0.25]
  piece_scale_variance: [-0.02, 0.02]  # Slight size differences

augmentation:
  post_render:
    sensor_noise:
      enabled: true
      probability: 0.70
      intensity_range: [0.01, 0.04]
      distribution: "gaussian"
    jpeg_artifacts:
      enabled: true
      probability: 0.50
      quality_range: [68, 92]
    motion_blur:
      enabled: true
      probability: 0.08
      kernel_range: [3, 5]
      angle_range: [0, 180]
    color_jitter:
      enabled: true
      hue_range: [-0.12, 0.12]
      saturation_range: [-0.08, 0.08]
      brightness_range: [-0.10, 0.10]
      probability: 0.35
    contrast:
      enabled: true
      probability: 0.15
      range: [-0.15, 0.15]
    sharpness:
      enabled: true
      probability: 0.20
      range: [-0.25, 0.25]
    vignette:
      enabled: true
      probability: 0.10
      intensity_range: [0.05, 0.15]

constraints:
  occlusion:
    max_overlap: 0.30
    ensure_variety: true
    occlusion_probability: 0.20         # 20% have occlusion
    extreme_occlusion_probability: 0.05   # 5% with 0.2-0.3 overlap
  board_rotation:
    allow_180: true
    probability: 0.25                   # 25% flipped
  piece_visibility:
    min_partial: 0.60
    full_board_visible_probability: 0.95  # 5% edge crops
  lighting:
    min_brightness: 25
    max_brightness: 245

output:
  resolution: [640, 640]
  format: "coco"
  additional_formats: ["yolo", "tfrecord"]  # Export all three
  include_metadata: true
  quality:
    samples: 128                        # High quality
    denoise: true
    color_depth: "16bit"                # HDR rendering
  
  # Filename template
  naming: "pos{position_id:03d}_var{variation:04d}_{split}"

parallelization:
  enabled: true
  workers: 4                          # CPU cores to use
  batch_size: 100
  memory_limit_gb: 4

distributed:
  enabled: false                      # Set to true for multi-machine
  total_shards: 1
  shard_id: 0
  coordinator_url: null

quality_control:
  enabled: true
  validation_rate: 0.05               # Check 5% of outputs
  auto_retry_failed: true
  max_retries: 3
  
paths:
  assets: "/data/chess_vision/assets/"
  output: "/data/chess_vision/datasets/production_v1/"
  temp: "/tmp/chess_gen/"
  checkpoint: "/data/chess_vision/checkpoints/"

logging:
  level: "INFO"
  file: "/var/log/chess_gen/production_v1.log"
  progress_interval: 100
  metrics:
    - render_time
    - memory_usage
    - gpu_utilization

post_generation:
  stats_report: true
  sample_visualizations: 50             # Generate preview images
  dataset_card: true                    # README for dataset
  upload_to: null                       # s3://bucket/path/ or null